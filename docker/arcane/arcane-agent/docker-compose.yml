---
services:
  arcane-agent:
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - HOSTNAME=${HOSTNAME}
    image: MAINTAINER/IMAGE:latest
    container_name: "arcane-agent-${HOSTNAME}" #
    hostname: "arcane-agent-${HOSTNAME}" #
    env_file:
      - "${BAK_CFG_DIR}/arcane-agent/.env"
    restart: unless-stopped
    volumes:
      - "${CFG_DIR}/arcane-agent:/config" #
    ports:
      - 80:80 #
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.services.arcane-agent.loadbalancer.server.port: portNumber #
      traefik.http.routers.arcane-agent.middlewares: oauth@file #add this to any container you want to use the Authentik web proxy
      traefik.http.routers.arcane-agent.rule: Host(`arcane-agent.${CF_DOMAIN}`)
      dev.quenary.tugtainer.protected: True #tugtainer ignore label `https://github.com/Quenary/tugtainer?tab=readme-ov-file#custom-labels`

networks:
  proxy:
    external: true
