---
services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ai-ollama
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    volumes:
      - /mnt/ai/local-models:/root/.ollama
    ports:
      - "11434:11434"
    group_add:
      - "44"
      - "993"
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.ollama.middlewares: oauth@file #add this to any container you want to use the Authentik web proxy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - webui_data:/app/backend/data
    ports:
      - "3033:8080"
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.open-webui.middlewares: oauth@file #add this to any container you want to use the Authentik web proxy


volumes:
  webui_data:
networks:
  proxy:
    external: true
