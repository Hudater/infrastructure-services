services:
  # UI dashboard
  dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    networks: [netbird, proxy]
    env_file:
      - "${BAK_CFG_DIR}/netbird/dashboard.env"
    ports:
      - '8090:80'
    labels:
      - traefik.enable=true
      - traefik.http.routers.netbird-dashboard.rule=Host(`netbird.${CF_DOMAIN}`)
      - traefik.http.routers.netbird-dashboard.entrypoints=https
      - traefik.http.routers.netbird-dashboard.tls=true
      - traefik.http.routers.netbird-dashboard.priority=1
      - traefik.http.services.netbird-dashboard.loadbalancer.server.port=80
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Combined server (Management + Signal + Relay + STUN)
  netbird-server:
    image: netbirdio/netbird-server:latest
    container_name: netbird-server
    restart: unless-stopped
    networks: [netbird, proxy]
    env_file:
      - "${BAK_CFG_DIR}/netbird/dashboard.env"
    ports:
      - '3479:3478/udp'
    volumes:
      - netbird_data:/var/lib/netbird
      - "${BAK_CFG_DIR}/netbird/config.yaml:/etc/netbird/config.yaml"
    command: ["--config", "/etc/netbird/config.yaml"]
    labels:
      - traefik.enable=true
      # gRPC router (needs h2c backend for HTTP/2 cleartext)
      - traefik.http.routers.netbird-grpc.rule=Host(`netbird.${CF_DOMAIN}`) && (PathPrefix(`/signalexchange.SignalExchange/`) || PathPrefix(`/management.ManagementService/`))
      - traefik.http.routers.netbird-grpc.entrypoints=https
      - traefik.http.routers.netbird-grpc.tls=true
      - traefik.http.routers.netbird-grpc.service=netbird-server-h2c
      - traefik.http.routers.netbird-grpc.priority=10
      # Backend router (relay, WebSocket, API, OAuth2)
      - traefik.http.routers.netbird-backend.rule=Host(`netbird.${CF_DOMAIN}`) && (PathPrefix(`/relay`) || PathPrefix(`/ws-proxy/`) || PathPrefix(`/api`) || PathPrefix(`/oauth2`))
      - traefik.http.routers.netbird-backend.entrypoints=https
      - traefik.http.routers.netbird-backend.tls=true
      - traefik.http.routers.netbird-backend.service=netbird-server
      # - traefik.http.routers.netbird-backend.priority=5
      # Services
      - traefik.http.services.netbird-server.loadbalancer.server.port=80
      - traefik.http.services.netbird-server-h2c.loadbalancer.server.port=80
      - traefik.http.services.netbird-server-h2c.loadbalancer.server.scheme=h2c
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # NetBird Proxy - exposes internal resources to the internet
  proxy:
    image: netbirdio/reverse-proxy:latest
    container_name: netbird-proxy
    ports:
    - 51820:51820/udp
    restart: unless-stopped
    networks: [netbird, proxy]
    depends_on:
      netbird-server:
        condition: service_started
    env_file:
      - "${BAK_CFG_DIR}/netbird/proxy.env"
    volumes:
      - "${BAK_CFG_DIR}/netbird/certs/${CF_DOMAIN}:/certs"
    labels:
      # TCP passthrough for *.netbird.${CF_DOMAIN}
      - traefik.enable=true
      - traefik.tcp.routers.proxy-passthrough.entrypoints=https 
      - traefik.tcp.routers.proxy-passthrough.rule=HostSNI(`*`)
      - traefik.tcp.routers.proxy-passthrough.tls.passthrough=true
      - traefik.tcp.routers.proxy-passthrough.service=proxy-tls
      - traefik.tcp.routers.proxy-passthrough.priority=1
      - traefik.tcp.services.proxy-tls.loadbalancer.server.port=8443
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  certs-dumper:
    image: ldez/traefik-certs-dumper:latest
    restart: unless-stopped
    container_name: netbird-certs-dumper
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    # entrypoint:
    #   - "/bin/sh"
    #   - "-c"
    #   - |
    #     while true; do
    #       traefik-certs-dumper file \
    #         --version v3 \
    #         --source /data/acme.json \
    #         --domain "*.domain.com" \
    #         --crt-name fullchain.pem \
    #         --key-name privkey.pem \
    #         --output /output
    #       sleep 12h
    #     done
    # entrypoint: sh -c '
    #   while ! [ -e /data/acme.json ]
    #   || ! [ `jq ".[] | .Certificates | length" /data/acme.json | jq -s "add" ` != 0 ]; do
    #   sleep 1
    #   ; done
    #   && traefik-certs-dumper file --version v3 --watch
    #   --source /data/acme.json --domain-subdir --crt-name=fullchain --crt-ext=.pem --key-name=privkey --key-ext=.pem --dest /output --post-hook "chown -R $PUID:$PGID /output"'
    entrypoint: sh -c '
      while ! [ -e /data/acme.json ]
      || ! [ `jq ".[] | .Certificates | length" /data/acme.json | jq -s "add" ` != 0 ]; do
      sleep 1
      ; done
      && traefik-certs-dumper file --version v3 --watch
      --source /data/acme.json --domain-subdir --crt-name=tls --crt-ext=.crt --key-name=tls --key-ext=.key --dest /output --post-hook "chown -R $PUID:$PGID /output"'
    volumes:
      - "${BAK_CFG_DIR}/traefik:/data:ro"
      - "${BAK_CFG_DIR}/netbird/certs:/output"

volumes:
  netbird_data:
  netbird_proxy_certs:

networks:
  netbird:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
  proxy:
    external: true
