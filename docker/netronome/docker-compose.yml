---
services:
  netronome:
    image: ghcr.io/autobrr/netronome:latest
    container_name: "netronome-${HOSTNAME}" #
    hostname: "netronome-${HOSTNAME}" #
    env_file:
      - "${BAK_CFG_DIR}/netronome/.env"
    restart: unless-stopped
    volumes:
      #- "${BAK_CFG_DIR}/netronome:/data" #
      - "${CFG_DIR}/netronome:/data" #
    ports:
      - "7575:7575"
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.netronome.middlewares: oauth@file #add this to any container you want to use the Authentik web proxy

networks:
  proxy:
    external: true

